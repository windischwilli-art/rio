<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIO — Tech meets Tropics</title>
    <style>
        /* Einbinden der Premium-Schriften von Google Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');

        :root {
            --bg-cream: #fdfbf7;        /* Hellcreme vom Flyer */
            --primary-green: #0b3c26;   /* Tiefes Dschungelgrün vom Flyer */
            --accent-tan: #d4b295;     /* Edles Sand/Gold vom Button */
            --accent-red: #b81d24;     /* Erdbeer-Rot */
            --text-dark: #1c1c1c;
            --text-light: #fdfbf7;
            --font-serif: 'Playfair Display', serif;
            --font-sans: 'Plus Jakarta Sans', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-cream);
            color: var(--text-dark);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Subtile Palmenblatt-Schatten im Hintergrund (Pure CSS) */
        .ambient-shadows {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.04;

            background-size: cover;
            filter: blur(30px);
        }

        header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 40px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .logo {
            font-family: var(--font-serif);
            font-size: 2.2rem;
            font-weight: 500;
            letter-spacing: 3px;
            color: var(--primary-green);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo svg {
            width: 38px;
            height: 38px;
            fill: var(--primary-green);
        }
